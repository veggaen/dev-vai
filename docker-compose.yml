  #     test: ["CMD-SHELL", "pg_isready -U vai"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10
  #   networks:
  #     - vai-net

  # ── Traefik (uncomment for public access + auto-HTTPS) ──
  # traefik:
  #   image: traefik:v3.0
  #   container_name: vai-proxy
  #   restart: unless-stopped
  #   command:
  #     - "--api.insecure=true"
  #     - "--providers.docker=true"
  #     - "--providers.docker.exposedbydefault=false"
  #     - "--entrypoints.web.address=:80"
  #     - "--entrypoints.websecure.address=:443"
  #     - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
  #     - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@vai.ai}"
