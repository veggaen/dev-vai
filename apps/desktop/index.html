<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#282c34" />
    <meta name="description" content="Vai — your work, your context, one room." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Vai</title>
    <script>
      /* Odysseus-style early theme paint — avoids flash before React boots */
      (function () {
        var PRESETS = {
          dark: { bg: '#282c34', fg: '#9cdef2', panel: '#111111', border: '#355a66', red: '#e06c75' },
          light: { bg: '#f0ebe3', fg: '#5a5248', panel: '#faf6f0', border: '#d4cdc2', red: '#c47d5a' },
        };
        var pref = 'dark';
        try { pref = localStorage.getItem('vai-theme-preference') || 'dark'; } catch (_) {}
        var c = PRESETS[pref] || PRESETS.dark;
        var s = document.documentElement.style;
        s.setProperty('--bg', c.bg);
        s.setProperty('--fg', c.fg);
        s.setProperty('--panel', c.panel);
        s.setProperty('--border', c.border);
        s.setProperty('--red', c.red);
        s.setProperty('--accent', c.red);
        s.setProperty('--sidebar-bg', c.panel);
        s.setProperty('--input-bg', c.panel);
        s.setProperty('--input-border', c.border);
        s.setProperty('--brand-color', c.red);
        document.documentElement.dataset.theme = pref;
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', c.bg);
      })();
    </script>
  </head>
  <body class="bg-[color:var(--bg)] text-[color:var(--fg)] antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
