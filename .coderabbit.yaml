language: en-US
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!**/dist/**"
    - "!**/coverage/**"
    - "!**/screenshots/**"
    - "!**/test-screenshots/**"
    - "!**/Temporary_files/**"
    - "!pnpm-lock.yaml"
  auto_review:
    enabled: true
    drafts: false

chat:
  auto_reply: true