# SearXNG settings for Vai
# Enables JSON API and configures trusted search engines

use_default_settings: true

server:
  limiter: false          # disable rate limits for local use
  image_proxy: false
  http_protocol_version: "1.1"

ui:
  static_use_hash: true
  default_locale: en
  query_in_title: true
  infinite_scroll: false
  default_theme: simple

search:
  safe_search: 0          # off — we do our own content filtering
  autocomplete: ''
  default_lang: en
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

# Enable JSON output format (required by Vai)
outgoing:
  request_timeout: 6.0
  useragent_suffix: ''
  pool_connections: 100
  pool_maxsize: 20

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
    timeout: 6.0

  - name: bing
    engine: bing
    shortcut: b
    disabled: false
    timeout: 6.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false
    timeout: 6.0

  - name: wikipedia
    engine: wikipedia
    shortcut: w
    disabled: false
    timeout: 6.0

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false
    timeout: 6.0
    categories: [it, q&a]

  - name: github
    engine: github
    shortcut: gh
    disabled: false
    timeout: 6.0
    categories: [it]

  - name: arxiv
    engine: arxiv
    shortcut: ar
    disabled: false
    timeout: 6.0
    categories: [science]

  - name: reddit
    engine: reddit
    shortcut: r
    disabled: false
    timeout: 6.0

formats:
  - html
  - json
